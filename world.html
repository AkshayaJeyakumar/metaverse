<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Tourist Explorer - 3D World</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Three.js and addons from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="world-page">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-world">
        <div class="nav-brand">🌍 Virtual Tourist Explorer</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="explore.html">Explore</a></li>
        </ul>
        <button id="screenshot-btn" class="btn btn-screenshot" title="Take Screenshot">📸 Screenshot</button>
    </nav>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Controls Hint (shown briefly) -->
    <div id="controls-hint" class="controls-hint">
        <p>🎮 Drag mouse to orbit | Scroll to zoom | WASD to move | Click monument for info</p>
    </div>

    <!-- Landmark Info Popup (hidden by default) -->
    <div id="landmark-popup" class="popup hidden">
        <div class="popup-content">
            <button id="close-popup" class="popup-close">&times;</button>
            <h2 id="popup-title">Monument Name</h2>
            <p class="popup-label">📍 Location</p>
            <p id="popup-country">-</p>
            <p class="popup-label">📜 Description</p>
            <p id="popup-description">-</p>
        </div>
        <div class="popup-overlay" id="popup-overlay"></div>
    </div>

    <script src="js/world.js"></script>
</body>
</html>
